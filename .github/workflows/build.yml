name: Build NekoLink3

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          pip install requests psutil win10toast pyinstaller
      
      - name: Build executable
        run: |
          pyinstaller --onedir --noconsole --name NekoLink3 --hidden-import win10toast run.py
      
      - name: Copy config template
        run: copy config-template.json dist\NekoLink3\config.json
      
      - uses: actions/upload-artifact@v4
        with:
          name: NekoLink3
          path: dist\NekoLink3\
